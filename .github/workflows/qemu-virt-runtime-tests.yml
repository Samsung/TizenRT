name: qemu-virt-runtime-tests

on:
  push:
    paths:
      - ".github/workflows/qemu-virt-runtime-tests.yml"
      - "apps/**"
      - "build/**"
      - "os/**"
      - "tools/**"
  pull_request:
    paths:
      - ".github/workflows/qemu-virt-runtime-tests.yml"
      - "apps/**"
      - "build/**"
      - "os/**"
      - "tools/**"
  workflow_dispatch:

jobs:
  qemu-virt-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: full_dramboot_xipelf
            download_args: "bl1 kernel common app1 bootparam"
          - config: flat_dramboot
            download_args: "bl1 kernel bootparam"

    steps:
      - uses: actions/checkout@v4

      - name: Build QEMU runtime image
        run: docker build -t tizenrt-qemu-virt-runtime:ci -f tools/qemu_test/Dockerfile .

      - name: Configure
        run: ./os/dbuild.sh configure qemu-virt ${{ matrix.config }}

      - name: Build
        run: ./os/dbuild.sh build

      - name: Download flash images
        run: ./os/dbuild.sh download ${{ matrix.download_args }}

      - name: Run runtime tests
        run: |
          mkdir -p test-results/${{ matrix.config }}
          docker run --rm --network none \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            tizenrt-qemu-virt-runtime:ci \
            python3 tools/qemu_test/run_qemu_tests.py \
              --artifact-dir /workspace/test-results/${{ matrix.config }} \
              --boot-timeout 120 \
              --command-timeout 10 \
              --tc-timeout 60

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-virt-${{ matrix.config }}
          path: test-results/${{ matrix.config }}
